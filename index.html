<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickHire</title>

<style>
body{font-family:Arial;margin:2rem;background:#d9ecff;color:#333}
h1,h2{text-align:center}
.hidden{display:none}
.skills-list,.profile,.employer{max-width:650px;margin:1.5rem auto;background:white;border-radius:10px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.skill{display:inline-block;margin:0.4rem;padding:0.6rem 1rem;border:1px solid #ccc;border-radius:20px;cursor:pointer}
.skill.selected{background:#007bff;color:white;border-color:#007bff}
.selected-skills{display:flex;flex-wrap:wrap;gap:0.5rem}
.selected-skill{background:#e5f1ff;padding:0.6rem 1rem;border-radius:15px}
.search-bar{display:block;margin:0 auto 1rem;max-width:400px;padding:0.6rem 1rem;border-radius:25px;border:1px solid #ccc;width:100%}
button{background:#007bff;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;cursor:pointer;margin-top:5px}
button:hover{background:#0056b3}
textarea,input{width:100%;margin-top:5px;border-radius:8px;border:1px solid #ccc;padding:0.5rem}
.application{background:#f0f7ff;padding:0.7rem 1rem;border-radius:10px;margin-top:0.5rem}
.expired{opacity:0.5}
</style>
</head>

<body>

<h1>QuickHire</h1>

<div id="authButtons">
<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Log In</button>
</div>

<div id="modeToggle" class="hidden">
<button id="toggleModeBtn">Switch Mode</button>
<button id="logoutBtn">Log Out</button>
</div>

<div id="userMode" class="hidden">

<h2>Your Skills</h2>

<div class="skills-list">
<input class="search-bar" id="searchInput" placeholder="Search skills">
<div id="skillsContainer"></div>
</div>

<div class="profile">
<h2>Your Profile</h2>
<div id="selectedSkills" class="selected-skills"></div>

<label>Upload Resume</label>
<input type="file" id="resumeUpload">
<p id="resumeStatus"></p>
</div>

<div class="profile">
<h2>Job Listings</h2>
<input class="search-bar" id="jobSearch" placeholder="Search jobs">
<div id="jobListings"></div>
</div>

<div class="profile">
<h2>My Applications</h2>
<div id="myApplications"></div>
</div>

</div>

<div id="employerMode" class="hidden">

<h2>Create Job</h2>

<div class="employer">

<label>Job Name</label>
<input id="jobName">

</html>
